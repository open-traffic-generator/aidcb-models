openapi: 3.0.3
info:
  title: Control state models
  description: >-
    All control state schemas
  version: ^0.0.0
components:
  schemas:
    Control.State:
      description: >-
        Request for setting operational state of configured resources.
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            port:
              x-field-uid: 1
            protocol:
              x-field-uid: 2
            traffic:
              x-field-uid: 3
            ai_workload:
              x-field-uid: 4
          x-field-uid: 1
        port:
          $ref: '#/components/schemas/State.Port'
          x-field-uid: 2
        protocol:
          $ref: '#/components/schemas/State.Protocol'
          x-field-uid: 3
        traffic:
          $ref: '#/components/schemas/State.Traffic'
          x-field-uid: 4
        ai_workload:
          $ref: '#/components/schemas/State.AiWorkload'
          x-field-uid: 6
    State.Port:
      description: >-
        States associated with configured ports.
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            link:
              x-field-uid: 1
            capture:
              x-field-uid: 2
          x-field-uid: 1
        link:
          $ref: './port.yaml#/components/schemas/State.Port.Link'
          x-field-uid: 2
        capture:
          $ref: './port.yaml#/components/schemas/State.Port.Capture'
          x-field-uid: 3
    State.Traffic:
      description: >-
        States associated with configured flows
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            flow_transmit:
              x-field-uid: 1
          x-field-uid: 1
        flow_transmit:
          $ref: './traffic.yaml#/components/schemas/State.Traffic.FlowTransmit'
          x-field-uid: 2
    State.Protocol:
      description: >-
        States associated with protocols on configured resources.
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            all:
              x-field-uid: 1
            route:
              x-field-uid: 2
            lacp:
              x-field-uid: 3
            bgp:
              x-field-uid: 4
            isis:
              x-field-uid: 5
            ospfv2:
              x-field-uid: 6
            ospfv3:
              x-field-uid: 7
          x-field-uid: 1
        all:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.All'
          x-field-uid: 2
        route:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Route'
          x-field-uid: 3
        lacp:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Lacp'
          x-field-uid: 4
        bgp:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Bgp'
          x-field-uid: 5
        isis:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Isis'
          x-field-uid: 6
        ospfv2:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Ospfv2'
          x-field-uid: 7
        ospfv3:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Ospfv3'
          x-field-uid: 8
        rocev2:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Rocev2'
          x-field-uid: 9
    State.AiWorkload:
      description: >-
        Run control for the AI workload. Set the desired state to request a
        transition; the runtime engine automatically transitions through any
        intermediate states to reach it. Configuring the hardware is started
        automatically by set_config, resulting in a stopped run_state unless an
        error is encountered, in which case the workload is left unconfigured.
        A running run_state may be requested even while still configuring. Once
        configured, the run_state usually only returns to stopped or aborted
        (both of which imply the hardware is still configured), although an
        unrecoverable hardware error may return it to the unconfigured
        config_state.

        Only one of config_state or run_state may be specified per call.
      type: object
      properties:
        config_state:
          description: >-
            The requested config state for the AI workload. Only unconfigured may
            be requested here (to deconfigure and release hardware); all other
            config transitions are driven automatically by set_config.
          type: string
          x-field-uid: 1
          x-enum:
            unconfigured:
              description: >-
                Deconfigure all hardware associated with this workload.
              x-field-uid: 1
        run_state:
          description: >-
            The requested run state for the AI workload. The runtime engine will
            automatically transition through intermediate states to reach it.
          type: string
          x-field-uid: 2
          x-enum:
            stopped:
              description: >-
                Stop execution gracefully. Not all applications support this.
              x-field-uid: 1
            running:
              description: >-
                Start execution of the AI workload. If the configuration has not
                been applied yet, it will be applied automatically before
                execution starts.
              x-field-uid: 2
            aborted:
              description: >-
                Stop execution immediately. Data may be lost. 
              x-field-uid: 3
