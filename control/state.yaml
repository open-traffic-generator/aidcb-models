openapi: 3.0.3
info:
  title: Control state models
  description: >-
    All control state schemas
  version: ^0.0.0
components:
  schemas:
    Control.State:
      description: >-
        Request for setting operational state of configured resources.
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            port:
              x-field-uid: 1
            protocol:
              x-field-uid: 2
            traffic:
              x-field-uid: 3
            ai_workload:
              x-field-uid: 4
          x-field-uid: 1
        port:
          $ref: '#/components/schemas/State.Port'
          x-field-uid: 2
        protocol:
          $ref: '#/components/schemas/State.Protocol'
          x-field-uid: 3
        traffic:
          $ref: '#/components/schemas/State.Traffic'
          x-field-uid: 4
        ai_workload:
          $ref: '#/components/schemas/State.AiWorkload'
          x-field-uid: 6
    State.Port:
      description: >-
        States associated with configured ports.
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            link:
              x-field-uid: 1
            capture:
              x-field-uid: 2
          x-field-uid: 1
        link:
          $ref: './port.yaml#/components/schemas/State.Port.Link'
          x-field-uid: 2
        capture:
          $ref: './port.yaml#/components/schemas/State.Port.Capture'
          x-field-uid: 3
    State.Traffic:
      description: >-
        States associated with configured flows
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            flow_transmit:
              x-field-uid: 1
          x-field-uid: 1
        flow_transmit:
          $ref: './traffic.yaml#/components/schemas/State.Traffic.FlowTransmit'
          x-field-uid: 2
    State.Protocol:
      description: >-
        States associated with protocols on configured resources.
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            all:
              x-field-uid: 1
            route:
              x-field-uid: 2
            lacp:
              x-field-uid: 3
            bgp:
              x-field-uid: 4
            isis:
              x-field-uid: 5
            ospfv2:
              x-field-uid: 6
            ospfv3:
              x-field-uid: 7
          x-field-uid: 1
        all:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.All'
          x-field-uid: 2
        route:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Route'
          x-field-uid: 3
        lacp:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Lacp'
          x-field-uid: 4
        bgp:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Bgp'
          x-field-uid: 5
        isis:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Isis'
          x-field-uid: 6
        ospfv2:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Ospfv2'
          x-field-uid: 7
        ospfv3:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Ospfv3'
          x-field-uid: 8
        rocev2:
          $ref: './protocol.yaml#/components/schemas/State.Protocol.Rocev2'
          x-field-uid: 9
    State.AiWorkload:
      description: >-
        Run control for the AI workload. Set the desired state to request a
        transition; the runtime engine automatically transitions through any
        intermediate states to reach it. 

        Only one of config_state or run_state may be specified per call.
      description: >-
        States associated with the defined AI Workload config
      type: object
      properties:
        choice:
          type: string
          default: ai_workload_trial
          x-enum:
            ai_workload_trial:
              x-field-uid: 1
          x-field-uid: 1
        ai_workload_trial:
          $ref: './ai_workload.yaml#/components/schemas/State.AiWorkload.Trial'
          x-field-uid: 2

