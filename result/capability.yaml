openapi: 3.0.3
info:
  title: Results models
  description: >-
    A results request
  version: ^0.0.0
components:
  schemas:
    Capabilities:
      description: >-
        A list of capabilities of the implementation
      type: object
      properties:
        unsupported:
          description: >-
            A list of /components/schemas/... paths that are not supported by the current implementation.
          type: array
          items:
            type: string
          x-status:
            status: deprecated
            information: |-
              This property is deprecated in favor of profile.supported_properties
          x-field-uid: 1
        formats:
          description: >-
            A /components/schemas/... path and specific format  details regarding
            the path.
            Specific model format details can be additional objects and properties
            represented as a hashmap.
            For example layer1 models are defined as a hashmap key to object with  each
            object consisting of a specific name/value property pairs.
            This list of items will detail any specific formats, properties, enums.
          type: array
          items:
            type: string
          x-field-uid: 2
        profiles:
          description: >-
            A list of supported profiles, each of which supports a subset of the OTG model.
            Each entry represents the path to a specific profile and its supported properties.
          type: array
          items:
            $ref: '#/components/schemas/Profile.Capabilities'
          x-field-uid: 3

    Profile.Capabilities:
      properties:
        profile_type:
          $ref: '../common/profile.yaml#/components/schemas/ProfileType'
          x-field-uid: 1
        otg:
          type: object
          properties:
            supported_properties:
              type: array
              items:
                type: string
                x-field-uid: 2
        ai_workloads:
          type: object
          properties:
            supported_properties:
              type: array
              items:
                type: string
                x-field-uid: 3
