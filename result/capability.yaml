openapi: 3.0.3
info:
  title: Results models
  description: >-
    A results request
  version: ^0.0.0
components:
  schemas:
    Capabilities:
      description: >-
        A list of capabilities of the implementation
      type: object
      properties:
        unsupported:
          description: >-
            A list of /components/schemas/... paths that are not supported by the current implementation.
          type: array
          items:
            type: string
          x-status:
            status: deprecated
            information: |-
              This property is deprecated in favor of profile.supported_properties
          x-field-uid: 1
        formats:
          description: >-
            A /components/schemas/... path and specific format  details regarding
            the path.
            Specific model format details can be additional objects and properties
            represented as a hashmap.
            For example layer1 models are defined as a hashmap key to object with  each
            object consisting of a specific name/value property pairs.
            This list of items will detail any specific formats, properties, enums.
          type: array
          items:
            type: string
          x-field-uid: 2
        profiles:
          description: >-
            A list of supported profiles, each of which supports a subset of the OTG model.
          type: array
          items:
            $ref: '#/components/schemas/Profile.Capabilities'
          x-field-uid: 3

    Profile.Capabilities:
      type: object
      description: |-
        Specifies the capabilities of a profile, which consists of recognized properties and/or enums,
        and potentially property metadata overrides.
      properties:
        profile_name:
          type: string
          description: >-
            The name of the profile.
          x-field-uid: 1
        supported_properties:
          type: array
          description: |-
            A list of supported properties and enums for the profile. All supported properties
            and enums must be explicitly enumerated to prevent issues when other profiles add 
            new properties.
          items:
            type: string
            x-field-uid: 2
        property_overrides:
          type: array
          description: 
            A list of schema properties to override.
          items:
            $ref: '#/components/schemas/PropertyOverride'
            x-field-uid: 3

    PropertyOverride:
      type: object
      description: |-
        Specifies an override for a schema property.
      properties:
        property_name:
          type: string
          description: >-
            The path name of the property to override.
          x-field-uid: 1
        default_value:
          type: string
          description: >-
            The new default value for the property. For numeric fields, the client must convert the string 
            value here to the appropriate numeric type first.
          x-field-uid: 2
        min_value:
          type: string
          description: >-
            The new minimum value for the property. For numeric fields, the client must convert the string 
            value here to the appropriate numeric type first.
          x-field-uid: 3
        max_value:
          type: string
          description: >-
            The new maximum value for the property. For numeric fields, the client must convert the string 
            value here to the appropriate numeric type first.
          x-field-uid: 4
