components:
  schemas:
    AiWorkload.State.Request:
      description: >-
        The request to retrieve the config and run states of the configured AI
        workload.
      type: object

    AiWorkload.State:
      description: >-
        The config and run states of the AI workload. An AI workload has
        two independent states: the config state, which tracks the lifecycle of
        the workload's configuration, and the run state, which tracks the
        lifecycle of the workload's automated execution.
      type: object
      properties:
        start_time:
          description: >-
            The ISO 8601 formatted time the run was started
          type: string
          x-field-uid: 1
        stop_time:
          description: >-
            The ISO 8601 formatted time the run ended
          type: string
          x-field-uid: 2
        success_status:
          $ref: './request.yaml#/components/schemas/Warning'
          x-field-uid: 3
        failure_status:
          $ref: './request.yaml#/components/schemas/Error'
          x-field-uid: 5
        trial_state:
          description: |-
            The current lifecycle state of the AI workload's trial run.
          type: string
          x-field-uid: 4
          x-enum:
            unrun:
              description: >-
                The current trial configuration has never been run
              x-field-uid: 1
            started:
              description: >-
                The trial is running.
              x-field-uid: 2
            stopping:
              description: >-
                The trial is in the process of stopping.
              x-field-uid: 3
            stopped:
              description: >-
                The trial has been manually stopped.
              x-field-uid: 4
            success:
              description: >-
                The trial finished successfully
              x-field-uid: 5
            failure:
              description: >-
                The trial failed with an error
              x-field-uid: 6

    

