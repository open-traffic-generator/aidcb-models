            Read-only info about the workload, e.g. server version.
          x-field-uid: 1
        #------------- app_type and related property selections
        app_type:
          type: string
          default: collective_benchmark
          description: >-
            Selects the workload type for the trial. Default is collective_benchmark.
          x-field-uid: 2
          x-enum:
            collective_benchmark:
              x-field-uid: 1
            workload_emulation:
              x-field-uid: 2
        collective_benchmark:
          $ref: '#/components/schemas/CcbConfig'
          description: >-
            Collective Communication Benchmark (CCB) configuration. Active when app_type is collective_benchmark.
          x-field-uid: 3
        workload_emulation:
          $ref: '#/components/schemas/WorkloadEmulationConfig'
          description: >-
            Workload Emulation (WE) configuration. Active when app_type is workload_emulation.
          x-field-uid: 4
        #------------- end of app_type property selections
        impairments:
          $ref: '#/components/schemas/Impairments'
          description: >-
            Network impairment configuration applied during the trial.
          x-field-uid: 5
