    AiWorkloadInfo:
      description: >-
        Information about the AI Workload (AI Data Center Builder) application
        including version, status, and build details.
      properties:
        version:
          x-include: '../common/common.yaml#/components/schemas/Versioned.Object/properties/version'
          description: >-
            The version of the AI Workload application.
          x-field-uid: 1
        build_date:
          type: string
          format: date-time
          description: >-
            The date and time when the AI Workload application was built.
          x-field-uid: 2
        config_version:
          x-include: '../common/common.yaml#/components/schemas/Versioned.Object/properties/version'
          description: >-
            The version of the trial config.
          x-field-uid: 3


