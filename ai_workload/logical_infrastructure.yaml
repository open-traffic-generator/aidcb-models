components:
  schemas:
    LogicalInfrastructure:
      description: >-
        Logical infrastructure describing the emulated infrastructure topology.
      type: object
      required: [infrastructure]
      properties:
        name:
          type: string
          description: >-
            Logical infrastructure name.
          x-field-uid: 1
        id:
          type: string
          description: >-
            System-assigned globally unique logical infrastructure ID.
          x-field-uid: 2
        infrastructure:
          $ref: '#/components/schemas/InfrastructureConfig'
          description: >-
            The configuration for this logical infrastructure.
          x-field-uid: 3

    InfrastructureConfig:
      description: >-
        Infrastructure configuration comprising hosts and the network fabric.
      type: object
      required: [host, fabric]
      properties:
        host:
          $ref: '#/components/schemas/InfrastructureHosts'
          description: >-
            Host configuration for the infrastructure.
          x-field-uid: 1
        fabric:
          $ref: '#/components/schemas/InfrastructureFabric'
          description: >-
            Fabric topology for the infrastructure.
          x-field-uid: 2

    InfrastructureHosts:
      description: >-
        High-level host specification for the infrastructure.
      type: object
      properties:
        choice:
          type: string
          default: uniform
          x-field-uid: 1
          x-enum:
            uniform:
              x-field-uid: 1
        uniform:
          $ref: '#/components/schemas/InfrastructureUniformHostCollection'
          x-field-uid: 2

    InfrastructureUniformHostCollection:
      description: >-
        Host specification consisting of a set of N hosts fashioned after a template.
      type: object
      required: [template]
      properties:
        count:
          type: integer
          default: 4
          minimum: 1
          maximum: 8192
          description: >-
            Number of hosts in the fabric.
          x-field-uid: 1
        template:
          $ref: '#/components/schemas/InfrastructureHostTemplate'
          description: >-
            A host template that is instantiated multiple times to form the collection of hosts.
          x-field-uid: 2

    InfrastructureHostTemplate:
      description: >-
        High-level single host specification for the infrastructure.
      type: object
      properties:
        choice:
          type: string
          default: generic
          x-field-uid: 1
          x-enum:
            generic:
              x-field-uid: 1
            rackplane:
              x-field-uid: 2
        generic:
          $ref: '#/components/schemas/GenericHost'
          x-field-uid: 2
        rackplane:
          $ref: '#/components/schemas/RackPlaneHost'
          x-field-uid: 3
        use_npu_interconnect:
          type: boolean
          default: false
          description: >-
            Emulate data transfer over NPU-to-NPU links within each host.
            When true, data transfers between interconnected ranks within
            a host are emulated.
          x-field-uid: 4

    GenericHost:
      description: >-
        Generic host builder parameters. Generic hosts have a 1:1 ratio
        of NICs and NPUs.
      type: object
      properties:
        name:
          type: string
          description: >-
            The name of this generic host instance.
          x-field-uid: 1
        npu_count:
          type: integer
          default: 1
          minimum: 1
          maximum: 8
          description: >-
            Number of Neural Processing Units (NPUs) in the host.
          x-field-uid: 2
        npu_interconnect:
          $ref: '#/components/schemas/NPUInterconnect'
          description: >-
            NPU interconnect linking NPUs within the host. If unset, NPUs are
            not connected.
          x-field-uid: 3

    RackPlaneHost:
      description: >-
        Host type intended for use with a rackplane fabric topology.
        Each host connects to each fabric plane with dedicated scale-up NICs.
      type: object
      properties:
        name:
          type: string
          description: >-
            The name of this rack-plane host instance.
          x-field-uid: 1
        npu_count:
          type: integer
          default: 1
          minimum: 1
          maximum: 8
          description: >-
            Number of NPUs per host.
          x-field-uid: 2
        scale_up_nic_count:
          type: integer
          default: 4
          minimum: 1
          maximum: 64
          description: >-
            Number of NICs connected to the scale-up network per host.
          x-field-uid: 3
        scale_out_nic_count:
          type: integer
          default: 0
          minimum: 0
          maximum: 64
          description: >-
            Number of NICs connected to the scale-out network per host.
          x-field-uid: 4

    InfrastructureFabric:
      description: >-
        Describes the overall fabric topology.
      type: object
      properties:
        choice:
          type: string
          default: blackbox
          x-field-uid: 1
          x-enum:
            blackbox:
              x-field-uid: 1
            rackplane:
              x-field-uid: 2
        blackbox:
          $ref: '#/components/schemas/BlackboxFabric'
          x-field-uid: 2
        rackplane:
          $ref: '#/components/schemas/RackPlaneFabric'
          x-field-uid: 3

    BlackboxFabric:
      description: >-
        A fabric where the internal topology is not modeled.
      type: object
      properties:
        name:
          type: string
          description: >-
            Fabric name.
          x-field-uid: 1

    RackPlaneFabric:
      description: >-
        Multi-plane rack fabric topology. The number of rack switches for
        intra-rack communication is driven by RackPlaneHost.scale_up_nic_count.
        The number of scale-out switches for inter-rack communication is driven
        by rack_count, RackPlaneHost.scale_out_nic_count, and hosts_per_rack.
      type: object
      properties:
        rack_count:
          type: integer
          default: 1
          minimum: 1
          maximum: 1024
          description: >-
            Number of racks in the fabric.
          x-field-uid: 1
        hosts_per_rack:
          type: integer
          default: 1
          minimum: 1
          maximum: 1024
          description: >-
            Number of hosts per rack.
          x-field-uid: 2
        scale_out_switch_speed:
          $ref: '#/components/schemas/EthernetSpeed'
          description: >-
            Ethernet speed for inter-rack communication via scale-out switches.
          x-field-uid: 3
        scale_up_switch_speed:
          $ref: '#/components/schemas/EthernetSpeed'
          description: >-
            Ethernet speed for intra-rack communication on the scale-up network.
          x-field-uid: 4

    EthernetSpeed:
      description: >-
        An Ethernet link speed, expressed either as a standard rate or as a
        custom bandwidth in Gbps.
      type: object
      properties:
        choice:
          type: string
          default: standard
          x-field-uid: 1
          x-enum:
            standard:
              x-field-uid: 1
            custom:
              x-field-uid: 2
        standard:
          description: >-
            A standard Ethernet speed.
          type: string
          default: speed_800gbps
          x-field-uid: 2
          x-enum:
            speed_100gbps:
              x-field-uid: 1
            speed_200gbps:
              x-field-uid: 2
            speed_400gbps:
              x-field-uid: 3
            speed_800gbps:
              x-field-uid: 4
        custom:
          description: >-
            A custom Ethernet speed, in Gbps.
          type: integer
          minimum: 0
          x-field-uid: 3

    NPUInterconnect:
      description: >-
        High-level NPU interconnect (e.g. NVLink) properties, most importantly
        the bandwidth.
      type: object
      properties:
        choice:
          type: string
          default: generic
          x-field-uid: 1
          x-enum:
            generic:
              x-field-uid: 1
            nvlink:
              x-status:
                status: under-review
              x-field-uid: 2
        generic:
          $ref: '#/components/schemas/GenericNPUInterconnect'
          x-field-uid: 2
        nvlink:
          $ref: '#/components/schemas/NVLinkInterconnect'
          x-field-uid: 3

    GenericNPUInterconnect:
      description: >-
        A generic NPU interconnect with a given bandwidth. Each NPU within the
        host is connected via a generic link attached to a single generic
        switch.
      type: object
      properties:
        bandwidth_gbps:
          description: >-
            The NPU interconnect bandwidth, in Gbps.
          type: integer
          default: 1600
          minimum: 0
          x-field-uid: 1

    NVLinkInterconnect:
      x-status:
        status: under-review
      description: >-
        An NVLink NPU interconnect. Features such as the bandwidth are
        inferred from the version.
      type: object
      properties:
        nvlink_version:
          description: >-
            The NVLink version.
          type: string
          default: nvlink_v5_0
          x-field-uid: 1
          x-enum:
            nvlink_v1_0:
              x-field-uid: 1
            nvlink_v2_0:
              x-field-uid: 2
            nvlink_v3_0:
              x-field-uid: 3
            nvlink_v4_0:
              x-field-uid: 4
            nvlink_v5_0:
              x-field-uid: 5
