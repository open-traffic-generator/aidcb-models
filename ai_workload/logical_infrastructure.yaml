components:
  schemas:
    LogicalInfrastructure:
      description: >-
        Logical infrastructure describing the emulated infrastructure topology.
      type: object
      properties:
        name:
          type: string
          description: >-
            Logical infrastructure name.
          x-field-uid: 1
        id:
          type: string
          description: >-
            System-assigned globally unique logical infrastructure ID.
          x-field-uid: 2
        infrastructure:
          $ref: '#/components/schemas/InfrastructureConfig'
          description: >-
            The configuration for this logical infrastructure.
          x-field-uid: 3

    InfrastructureConfig:
      description: >-
        Infrastructure configuration comprising hosts and the network fabric.
      type: object
      properties:
        host:
          $ref: '#/components/schemas/InfrastructureHosts'
          description: >-
            Host configuration for the infrastructure.
          x-field-uid: 1
        fabric:
          $ref: '#/components/schemas/InfrastructureFabric'
          description: >-
            Fabric topology for the infrastructure.
          x-field-uid: 2

    InfrastructureHosts:
      description: >-
        High-level host specification for the infrastructure.
      type: object
      properties:
        choice:
          type: string
          default: uniform
          x-field-uid: 1
          x-enum:
            uniform:
              x-field-uid: 1
        uniform:
          $ref: '#/components/schemas/InfrastructureUniformHostCollection'
          x-field-uid: 2

    InfrastructureUniformHostCollection:
      description: >-
        Host specification consisting of a set of N hosts fashioned after a template.
      type: object
      properties:
        count:
          type: integer
          default: 4
          minimum: 1
          maximum: 8192
          description: >-
            Number of hosts in the fabric.
          x-field-uid: 1
        template:
          $ref: '#/components/schemas/InfrastructureHostTemplate'
          description: >-
            A host template that is instantiated multiple times to form the collection of hosts.
          x-field-uid: 2

    InfrastructureHostTemplate:
      description: >-
        High-level single host specification for the infrastructure.
      type: object
      properties:
        choice:
          type: string
          default: generic
          x-field-uid: 1
          x-enum:
            generic:
              x-field-uid: 1
            rackplane:
              x-field-uid: 2
        generic:
          $ref: '#/components/schemas/GenericHost'
          x-field-uid: 2
        rackplane:
          $ref: '#/components/schemas/RackPlaneHost'
          x-field-uid: 3
        use_npu_interconnect:
          type: boolean
          default: false
          description: >-
            Emulate data transfer over NPU-to-NPU links within each host.
            When true, data transfers between interconnected ranks within
            a host are emulated.
          x-field-uid: 4

    GenericHost:
      description: >-
        Generic host builder parameters. Generic hosts have a 1:1 ratio
        of NICs and NPUs.
      type: object
      properties:
        name:
          type: string
          description: >-
            The name of this generic host instance.
          x-field-uid: 1
        npu_count:
          type: integer
          default: 1
          minimum: 1
          maximum: 8
          description: >-
            Number of Neural Processing Units (NPUs) in the host.
          x-field-uid: 2
        npu_interconnect_bandwidth_gbps:
          type: integer
          default: 1600
          minimum: 0
          description: >-
            NPU interconnect bandwidth within the host in Gbps.
            A value of 0 means no NPU-to-NPU interconnect within the host.
            If non-zero, each NPU within the host is interconnected via a
            generic link attached to a single generic switch.
          x-field-uid: 3

    RackPlaneHost:
      description: >-
        Host type intended for use with a rackplane fabric topology.
        Each host connects to each fabric plane with dedicated scale-up NICs.
      type: object
      properties:
        name:
          type: string
          description: >-
            The name of this rack-plane host instance.
          x-field-uid: 1
        npu_count:
          type: integer
          default: 1
          minimum: 1
          maximum: 8
          description: >-
            Number of NPUs per host.
          x-field-uid: 2
        scale_up_nic_count:
          type: integer
          default: 4
          minimum: 1
          maximum: 64
          description: >-
            Number of NICs connected to the scale-up network per host.
          x-field-uid: 3
        scale_out_nic_count:
          type: integer
          default: 0
          minimum: 0
          maximum: 64
          description: >-
            Number of NICs connected to the scale-out network per host.
          x-field-uid: 4

    InfrastructureFabric:
      description: >-
        Describes the overall fabric topology.
      type: object
      properties:
        choice:
          type: string
          default: blackbox
          x-field-uid: 1
          x-enum:
            blackbox:
              x-field-uid: 1
            rackplane:
              x-field-uid: 2
        blackbox:
          $ref: '#/components/schemas/BlackboxFabric'
          x-field-uid: 2
        rackplane:
          $ref: '#/components/schemas/RackPlaneFabric'
          x-field-uid: 3

    BlackboxFabric:
      description: >-
        A fabric where the internal topology is not modeled.
      type: object
      properties:
        name:
          type: string
          description: >-
            Fabric name.
          x-field-uid: 1

    RackPlaneFabric:
      description: >-
        Multi-plane rack fabric topology. The number of rack switches for
        intra-rack communication is driven by RackPlaneHost.scale_up_nic_count.
        The number of scale-out switches for inter-rack communication is driven
        by rack_count, RackPlaneHost.scale_out_nic_count, and hosts_per_rack.
      type: object
      properties:
        rack_count:
          type: integer
          default: 1
          minimum: 1
          maximum: 1024
          description: >-
            Number of racks in the fabric.
          x-field-uid: 1
        hosts_per_rack:
          type: integer
          default: 1
          minimum: 1
          maximum: 1024
          description: >-
            Number of hosts per rack.
          x-field-uid: 2
        scale_out_switch_speed:
          type: string
          default: speed_800g
          description: >-
            Ethernet speed for inter-rack communication via scale-out switches.
            Default is speed_800g.
            speed_100g: 100 Gigabit Ethernet.
            speed_200g: 200 Gigabit Ethernet.
            speed_400g: 400 Gigabit Ethernet.
            speed_800g: 800 Gigabit Ethernet.
          x-field-uid: 3
          x-enum:
            speed_100g:
              x-field-uid: 1
            speed_200g:
              x-field-uid: 2
            speed_400g:
              x-field-uid: 3
            speed_800g:
              x-field-uid: 4
        scale_up_switch_speed:
          type: string
          default: speed_800g
          description: >-
            Ethernet speed for intra-rack communication on the scale-up network.
            Default is speed_800g.
            speed_100g: 100 Gigabit Ethernet.
            speed_200g: 200 Gigabit Ethernet.
            speed_400g: 400 Gigabit Ethernet.
            speed_800g: 800 Gigabit Ethernet.
          x-field-uid: 4
          x-enum:
            speed_100g:
              x-field-uid: 1
            speed_200g:
              x-field-uid: 2
            speed_400g:
              x-field-uid: 3
            speed_800g:
              x-field-uid: 4
