components:
  schemas:
    FileInfo:
      description: >-
        Information about a file.
      type: object
      properties:
        path:
          type: string
          description: >-
            The path of the file.
          x-field-uid: 1
        size:
          type: integer
          description: >-
            The size of the file in bytes.
          x-field-uid: 2


#
# Warning!!!: The TrialBindings are still in progress. Do not implement any converters for this object or its children
#
    TrialBindings:
      description: >-
        Describes test resources, how they are configured, and how they are attached
        to the topology.
      type: object
      properties:
        custom_binding:
          $ref: '#/components/schemas/CustomBinding'
          description: >-
            Custom binding that maps ranks to NPUs, configures NIC settings,
            and assigns physical test resources.
          x-field-uid: 1
        infrastructure_profile:
          $ref: '#/components/schemas/InfrastructureProfile'
          description: >-
            A copy of the infrastructure profile used when the binding was created.
            Allows trials to be re-run with the original profile version.
          x-field-uid: 2
        infrastructure:
          type: string
          description: >-
            Low-level Chakra infrastructure derived from the infrastructure_profile.
            JSON-encoded opaque value — see keysight_chakra.infra.Infrastructure.
          x-field-uid: 3
        infrastructure_annotations:
          type: array
          items:
            type: string
          description: >-
            Annotations for the low-level Chakra infrastructure.
            JSON-encoded opaque values — see keysight_chakra.infra.Annotation.
          x-field-uid: 4
        platform_regions:
          type: array
          items:
            $ref: '#/components/schemas/PlatformRegion'
          description: >-
            Assigns platforms to different regions of the infrastructure.
          x-field-uid: 5
        group_specs:
          type: array
          items:
            $ref: '#/components/schemas/GroupSpec'
          description: >-
            Specifications for creating named process groups.
            Each spec defines a prefix, count, optional size, and allocation strategy.
          x-field-uid: 6

    ResultInfo:
      description: >-
        General information about the Trial Result
      properties:
        tags:
          x-include: '../common/common.yaml#/components/schemas/Tagged.Object/properties/tags'
          description: >-
            The list of tags associated with the trial.
          x-field-uid: 3
        description:
          x-include: '../common/common.yaml#/components/schemas/Described.Object/properties/description'
          description: >-
            A detailed description of the trial.
          x-field-uid: 4
      type: object

    CcbResult:
      description: >-
        General information about the Trial Result
      required: [id]
      properties:
        id:
          x-include: '../common/common.yaml#/components/schemas/Identified.Object/properties/id'
          description: >-
            The ID of the trial.
          x-field-uid: 1
        info:
          $ref: '#/components/schemas/ResultInfo'
          description: >-
            General information about the Trial Result.
          x-field-uid: 2
        tags:
          x-include: '../common/common.yaml#/components/schemas/Tagged.Object/properties/tags'
          description: >-
            The list of tags associated with the trial.
          x-field-uid: 3
        description:
          x-include: '../common/common.yaml#/components/schemas/Described.Object/properties/description'
          description: >-
            A detailed description of the trial.
          x-field-uid: 4
      type: object

    CcbConfig:
      description: >-
        CCB (Collective Communication Benchmark) configuration.
      type: object
      properties:
        benchmark:
          $ref: '#/components/schemas/CcbBenchmark'
          description: >-
            The benchmark configuration defining the collective communication test.
          x-field-uid: 1

    WorkloadEmulationConfig:
      description: >-
        Workload Emulation (WE) configuration for a trial run.
        PLACEHOLDER: WE configuration schema is not yet defined.
      type: object
      properties:
        placeholder:
          type: string
          description: >-
            Placeholder property — WE configuration is not yet modelled.
            This field has no effect and will be removed in a future version.
          x-field-uid: 1

    PlatformConfig:
      description: >-
        Platform configuration for a trial run. Specifies per-platform typed settings.
      type: object
      properties:
        name:
          description: >-
            The name of this platform
          type: string
          x-field-uid: 1
        choice:
          type: string
          description: >-
            The platform type to use for this trial run.
            unspecified: platform is not set; the server applies its default.
            keysight_nccl_test: Keysight NCCL test platform.
            keysight_sw: Keysight software simulation platform.
            keysight_hw: Keysight hardware platform (default for most trials).
            custom: custom or third-party platform; use PhysicalBindingConfig.custom_settings for binding parameters.
            keysight_scp_sim: Keysight SCP simulation platform.
          x-field-uid: 2
          x-enum:
            keysight_nccl_test:
              x-field-uid: 1
            keysight_sw:
              x-field-uid: 2
            keysight_hw:
              x-field-uid: 3
            custom:
              x-field-uid: 4
            keysight_scp_sim:
              x-field-uid: 5
        custom_settings:
          $ref: '#/components/schemas/StringMap'
          description: >-
            Generic key/value platform settings. May be used by all platforms
            for testing purposes. For platform=custom, this is the primary
            platform configuration — pass all vendor-specific parameters here.
          x-field-uid: 3
        keysight_nccl_test:
          $ref: '#/components/schemas/KeysightNcclTestConfig'
          description: >-
            Configuration specific to the Keysight NCCL test platform.
          x-field-uid: 4
        keysight_sw:
          $ref: '#/components/schemas/KeysightSwConfig'
          description: >-
            Configuration specific to the Keysight software agent platform.
          x-field-uid: 5
        keysight_hw:
          $ref: '#/components/schemas/KeysightHwConfig'
          description: >-
            Configuration specific to the Keysight hardware platform.
          x-field-uid: 6
        custom:
          $ref: '#/components/schemas/CustomPlatformConfig'
          description: >-
            Configuration for a custom or third-party platform. Use
            PhysicalBindingConfig.custom_settings for per-binding parameters.
          x-field-uid: 7
        keysight_scp_sim:
          $ref: '#/components/schemas/KeysightScpSimConfig'
          description: >-
            Configuration specific to the Keysight SCP simulation platform.
          x-field-uid: 8

    KeysightNcclTestConfig:
      description: >-
        Configuration for the Keysight NCCL test platform.
      type: object
      properties:
        nccl_env_vars:
          $ref: '#/components/schemas/StringMap'
          description: >-
            NCCL environment variable overrides as name/value pairs.
          x-field-uid: 1

    KeysightSwConfig:
      description: >-
        Strongly-typed configuration for the Keysight software agent platform.
        Placeholder — parameters will be added as requirements are identified.
      type: object

    KeysightHwConfig:
      description: >-
        Strongly-typed configuration for the Keysight hardware platform.
        Placeholder — parameters will be added as requirements are identified.
      type: object

    CustomPlatformConfig:
      description: >-
        Configuration for a custom or third-party platform. Allows any vendor
        to implement the CCB API without requiring schema changes. Platform-level
        key/value settings go in PlatformConfig.custom_settings; per-binding
        settings go in PhysicalBindingConfig.custom_settings.
      type: object
      properties:
        vendor:
          type: string
          description: >-
            Identifies the platform vendor or implementation. Informational only.
          x-field-uid: 1

    KeysightScpSimConfig:
      description: >-
        Strongly-typed configuration for the Keysight SCP simulation platform.
        Placeholder — parameters will be added as requirements are identified.
      type: object

    TcpStoreConfig:
      description: >-
        TCPStore endpoint address used for Queue Pair negotiation when
        qp_negotiation is tcp_store.
      type: object
      properties:
        host:
          type: string
          default: localhost
          description: Hostname or IP address of the TCPStore. Default is localhost.
          x-field-uid: 1
        port:
          type: integer
          default: 12345
          minimum: 1024
          maximum: 65535
          description: Port number of the TCPStore.
          x-field-uid: 2

    CcbBenchmark:
      description: >-
        CCB benchmark configuration. Defines a collective communication test.
      type: object
      properties:
        collective_algorithm:
          $ref: '#/components/schemas/Algorithm'
          description: >-
            The collective communication algorithm to use.
          x-field-uid: 1
        datasize_mode:
          type: string
          default: list
          description: >-
            Selects the data size specification. multiplier iterates from start to end
            by repeatedly multiplying by a factor. list uses an explicit set of sizes.
            Default is list.
          x-field-uid: 2
          x-enum:
            multiplier:
              x-field-uid: 1
            list:
              x-field-uid: 2
        multiplier:
          $ref: '#/components/schemas/CcbDatasize'
          description: >-
            Data size range using a multiplier. Active when datasize_mode is multiplier.
          x-field-uid: 3
        list:
          $ref: '#/components/schemas/CcbDatasizeList'
          description: >-
            Explicit list of data sizes. Active when datasize_mode is list.
          x-field-uid: 4
        iterations:
          type: integer
          format: int64
          default: 1
          minimum: 1
          maximum: 4294967295
          description: >-
            Number of benchmark runs per data size.
          x-field-uid: 5
        channels:
          $ref: '#/components/schemas/ChannelsTopology'
          description: >-
            The channels topology configuration specifying how ranks are distributed and connected.
          x-field-uid: 6
        iteration_append_delay:
          type: integer
          default: 100
          minimum: 0
          maximum: 10000
          description: >-
            Additional delay in milliseconds between repeated executions of the benchmark.
          x-field-uid: 7

    CcbDatasize:
      description: >-
        Data size range specification for a CCB benchmark.
        Starting at start, each subsequent size is obtained by multiplying by multiplier,
        continuing until end is reached.
      type: object
      properties:
        start:
          type: integer
          format: int64
          default: 134217728
          minimum: 1
          description: >-
            Initial data size in bytes. Default 134217728 (128 MiB).
          x-field-uid: 1
        multiplier:
          type: integer
          default: 2
          minimum: 2
          description: >-
            Factor by which the data size is multiplied at each step.
          x-field-uid: 2
        end:
          type: integer
          format: int64
          default: 4294967296
          minimum: 1
          description: >-
            Maximum data size in bytes. The last size run is the largest value
            not exceeding end. Default 4294967296 (4 GiB).
          x-field-uid: 3

    CcbDatasizeList:
      description: >-
        Explicit list of data sizes for a CCB benchmark.
      type: object
      properties:
        size_bytes:
          type: array
          items:
            type: integer
            format: int64
            minimum: 1
          default: [1073741824]
          description: >-
            List of data sizes in bytes. Default [1073741824] (1 GiB).
          x-field-uid: 1

    Algorithm:
      description: >-
        Specifies a collective communication algorithm — either a system-provided
        implementation or a custom user-provided one.
      type: object
      properties:
        algorithm_category:
          type: string
          default: system
          description: >-
            Selects whether to use a system-provided or custom algorithm. Default is system.
          x-field-uid: 1
          x-enum:
            system:
              x-field-uid: 1
            custom:
              x-field-uid: 2
        system:
          type: string
          default: all_to_all_parallel
          description: >-
            A system-supplied collective algorithm. Active when algorithm_category is system.
            Default is all_to_all_parallel. _pp suffix variants are MSCCL++ implementations.
          x-field-uid: 2
          x-enum:
            all_to_all_parallel:
              x-field-uid: 1
            all_to_all_pxn:
              x-field-uid: 2
            all_reduce_unidirectional_ring:
              x-field-uid: 3
            all_reduce_bidirectional_ring:
              x-field-uid: 4
            all_reduce_vector_halving_doubling:
              x-field-uid: 5
            all_reduce_double_binary_tree:
              x-field-uid: 6
            all_gather_ring:
              x-field-uid: 7
            reduce_scatter_ring:
              x-field-uid: 8
            broadcast_parallel:
              x-field-uid: 9
            gather_parallel:
              x-field-uid: 10
            all_to_all_parallel_pp:
              x-field-uid: 11
            all_to_all_pxn_pp:
              x-field-uid: 12
            all_reduce_unidirectional_ring_pp:
              x-field-uid: 13
            all_reduce_bidirectional_ring_pp:
              x-field-uid: 14
            all_reduce_vector_halving_doubling_pp:
              x-field-uid: 15
        custom:
          type: string
          description: >-
            A path of format package.module.classname to a class that inherits from
            keys_ai_ml_chakra.Expander. Active when algorithm_category is custom.
          x-field-uid: 3
        flow_control_config:
          $ref: '#/components/schemas/FlowControl'
          description: >-
            Configuration for the flow control mechanism used by this algorithm.
          x-field-uid: 4

    FlowControl:
      description: >-
        Flow control mechanism configuration. Receiver grants credits to sender to control data flow.
      type: object
      properties:
        enable_flow_control:
          type: boolean
          default: false
          description: >-
            Enable flow control. Default false.
          x-field-uid: 1
        max_inflight_credits:
          type: integer
          default: 4
          minimum: 1
          maximum: 8
          description: >-
            Maximum number of credits allowed in flight.
          x-field-uid: 2
        credit_distribution:
          type: string
          default: all_streams
          description: >-
            Determines how credits are distributed across streams.
            all_streams: one credit unblocks all streams simultaneously.
            single_stream: one credit unblocks one stream at a time.
            Default is all_streams.
          x-field-uid: 3
          x-enum:
            all_streams:
              x-field-uid: 1
            single_stream:
              x-field-uid: 2
        delay_type:
          type: string
          default: manual
          description: >-
            Selects whether compute delay is manually configured or automatically derived.
          x-field-uid: 4
          x-enum:
            manual:
              x-field-uid: 1
            automatic:
              x-field-uid: 2
        manual:
          $ref: '#/components/schemas/ManualComputeDelay'
          description: >-
            Manual compute delay configuration. Active when delay_type is manual.
          x-field-uid: 5
        automatic:
          $ref: '#/components/schemas/AutomaticComputeDelay'
          description: >-
            Automatic compute delay configuration. Active when delay_type is automatic.
          x-field-uid: 6

    ManualComputeDelay:
      description: >-
        Manual compute delay configuration for flow control.
      type: object
      properties:
        compute_delay:
          type: integer
          default: 0
          minimum: 0
          maximum: 5000
          description: >-
            Delay between data reception and credit transmission in microseconds.
          x-field-uid: 1

    AutomaticComputeDelay:
      description: >-
        Automatic compute delay configuration for flow control.
        GPU type determines the compute delay function used.
      type: object
      properties:
        gpu_type:
          type: string
          default: a100
          description: >-
            GPU type used to derive the default compute delay. Default is a100.
          x-field-uid: 1
          x-enum:
            a100:
              x-field-uid: 1
            h100:
              x-field-uid: 2

    ChannelsTopology:
      description: >-
        Topology defining all communication channels in the system.
      type: object
      properties:
        channels:
          type: array
          items:
            $ref: '#/components/schemas/Channel'
          description: >-
            List of all communication channels configured in the topology.
          x-field-uid: 1

    Channel:
      description: >-
        A communication channel defining how collective operations are executed across ranks.
      type: object
      properties:
        algorithm_type:
          type: string
          description: >-
            The communication algorithm used for collective operations on this channel.
            _pp suffix variants are MSCCL++ implementations.
          x-field-uid: 1
          x-enum:
            all_to_all_parallel:
              x-field-uid: 1
            all_to_all_pxn:
              x-field-uid: 2
            all_reduce_unidirectional_ring:
              x-field-uid: 3
            all_reduce_bidirectional_ring:
              x-field-uid: 4
            all_reduce_vector_halving_doubling:
              x-field-uid: 5
            all_reduce_double_binary_tree:
              x-field-uid: 6
            all_gather_ring:
              x-field-uid: 7
            reduce_scatter_ring:
              x-field-uid: 8
            broadcast_parallel:
              x-field-uid: 9
            gather_parallel:
              x-field-uid: 10
            all_to_all_parallel_pp:
              x-field-uid: 11
            all_to_all_pxn_pp:
              x-field-uid: 12
            all_reduce_unidirectional_ring_pp:
              x-field-uid: 13
            all_reduce_bidirectional_ring_pp:
              x-field-uid: 14
            all_reduce_vector_halving_doubling_pp:
              x-field-uid: 15
        rank_distribution:
          $ref: '#/components/schemas/RankDistribution'
          description: >-
            How ranks are mapped and ordered within this channel.
          x-field-uid: 2

    RankDistribution:
      description: >-
        Defines how ranks are distributed across a communication channel.
      type: object
      properties:
        distribution:
          type: string
          description: >-
            The rank ordering scheme.
            ascending: 0, 1, 2, 3, ...
            descending: N, N-1, N-2, ...
            interleaved: 0, N/2, 1, N/2+1, ...
            custom: explicit order specified in custom_order.
          x-field-uid: 1
          x-enum:
            ascending:
              x-field-uid: 1
            descending:
              x-field-uid: 2
            interleaved:
              x-field-uid: 3
            custom:
              x-field-uid: 4
        custom_order:
          type: array
          items:
            type: integer
          description: >-
            Explicit list of rank IDs in the desired order.
            Only applicable when distribution is custom.
          x-field-uid: 2

    Impairments:
      description: >-
        Container for configuring network impairments applied during a trial.
      type: object
      properties:
        packet_drop:
          $ref: '#/components/schemas/PacketDrop'
          description: >-
            Packet drop impairment configuration.
          x-field-uid: 1
        packet_reorder:
          $ref: '#/components/schemas/PacketReorder'
          description: >-
            Packet reorder impairment configuration.
          x-field-uid: 2

    PacketDrop:
      description: >-
        Simulates packet loss by dropping packets matching any of the specified conditions.
      type: object
      properties:
        enabled:
          type: boolean
          default: false
          description: >-
            Whether packet drop impairment is active. Default false.
          x-field-uid: 1
        match_conditions:
          type: array
          items:
            $ref: '#/components/schemas/MatchConditions'
          description: >-
            List of match condition sets (OR logic). Packets matching any set are dropped.
          x-field-uid: 2
        skip_count:
          type: integer
          default: 0
          minimum: 0
          maximum: 16777215
          description: >-
            Number of matching packets to skip before dropping.
          x-field-uid: 3
        drop_count:
          type: integer
          default: 1
          minimum: 1
          maximum: 16777215
          description: >-
            Number of consecutive packets to drop after skip_count.
          x-field-uid: 4

    PacketReorder:
      description: >-
        Simulates out-of-order packet delivery for testing reordering resilience.
      type: object
      properties:
        enabled:
          type: boolean
          default: false
          description: >-
            Whether packet reorder impairment is active. Default false.
          x-field-uid: 1
        match_conditions:
          type: array
          items:
            $ref: '#/components/schemas/MatchConditions'
          description: >-
            List of match condition sets (OR logic).
          x-field-uid: 2
        skip_count:
          type: integer
          default: 0
          minimum: 0
          maximum: 16777215
          description: >-
            Number of matching packets to skip before reordering.
          x-field-uid: 3
        reorder_count:
          type: integer
          default: 1
          minimum: 1
          maximum: 511
          description: >-
            Number of packets to send out-of-order.
            reorder_count + hold_count must be less than 512.
          x-field-uid: 4
        hold_count:
          type: integer
          default: 1
          minimum: 1
          maximum: 511
          description: >-
            Number of packets to delay before sending the reordered packets.
          x-field-uid: 5

    MatchConditions:
      description: >-
        A set of match conditions — all are required (ANDed).
      type: object
      properties:
        location:
          type: string
          default: src
          description: >-
            Whether to impair at the source (sender) or destination (receiver) side.
            Default is src.
          x-field-uid: 1
          x-enum:
            src:
              x-field-uid: 1
            dst:
              x-field-uid: 2
        collective:
          $ref: '#/components/schemas/CollectiveMatchConditions'
          description: >-
            Collective communication flow to match.
          x-field-uid: 2
        packet:
          type: array
          items:
            $ref: '#/components/schemas/PacketConditions'
          description: >-
            Packet-level conditions to match.
          x-field-uid: 3

    CollectiveMatchConditions:
      description: >-
        Match conditions for a collective communication flow between two NICs.
      type: object
      properties:
        src_nic:
          $ref: '#/components/schemas/InfraRef'
          description: >-
            Reference to the source network interface card.
          x-field-uid: 1
        dst_nic:
          $ref: '#/components/schemas/InfraRef'
          description: >-
            Reference to the destination network interface card.
          x-field-uid: 2
        flow_index:
          type: integer
          default: 0
          minimum: 0
          maximum: 16777215
          description: >-
            Index identifying a specific flow between source and destination.
          x-field-uid: 3

    PacketConditions:
      description: >-
        Packet-level match conditions. Supports different protocol-specific criteria.
      type: object
      properties:
        packet_conditions_type:
          type: string
          description: >-
            The type of packet conditions to match.
          x-field-uid: 1
          x-enum:
            rdma:
              x-field-uid: 1
        rdma:
          $ref: '#/components/schemas/RdmaMatchConditions'
          description: >-
            RDMA-specific match conditions. Active when packet_conditions_type is rdma.
          x-field-uid: 2

    RdmaMatchConditions:
      description: >-
        Match conditions for RDMA packets. Allows matching on multiple opcodes simultaneously.
      type: object
      properties:
        opcode_list:
          type: array
          items:
            $ref: '#/components/schemas/RdmaOpcodeMatch'
          description: >-
            List of RDMA opcodes to match (OR logic).
          x-field-uid: 1

    RdmaOpcodeMatch:
      description: >-
        Matches a specific RDMA packet opcode type.
      type: object
      properties:
        value:
          type: string
          default: source_any
          description: >-
            The RDMA opcode value to match.
            first: RDMA Write/Send first packet.
            middle: RDMA Write/Send middle packet.
            last: RDMA Write/Send last packet.
            source_any: any packet sent by source.
            ack: acknowledgment from destination.
            nack: negative acknowledgment from destination.
            destination_any: any packet sent by destination.
            Default is source_any.
          x-field-uid: 1
          x-enum:
            first:
              x-field-uid: 1
            middle:
              x-field-uid: 2
            last:
              x-field-uid: 3
            source_any:
              x-field-uid: 4
            ack:
              x-field-uid: 5
            nack:
              x-field-uid: 6
            destination_any:
              x-field-uid: 7

    InfraRef:
      description: >-
        A reference to a logical infrastructure element.
      type: object
      properties:
        device_instance_name:
          type: string
          description: >-
            Name of the logical infrastructure device (e.g. the value set for dse_infra.GenericHost.name).
          x-field-uid: 1
        device_index:
          type: integer
          description: >-
            Zero-based device index.
          x-field-uid: 2
        component_name:
          type: string
          description: >-
            Name of the logical infrastructure component.
          x-field-uid: 3
        component_index:
          type: integer
          description: >-
            Zero-based component index.
          x-field-uid: 4

    CustomBinding:
      description: >-
        Maps ranks to logical NPUs, configures NIC settings, and assigns physical test resources.
      type: object
      properties:
        rank_bindings:
          type: array
          items:
            $ref: '#/components/schemas/RankBinding'
          description: >-
            List of bindings that map each rank to a specific logical NPU and its available NICs.
          x-field-uid: 1
        nic_bindings:
          type: array
          items:
            $ref: '#/components/schemas/NicBinding'
          description: >-
            List of NIC configuration bindings specifying settings and associated physical bindings.
          x-field-uid: 2
        physical_bindings:
          type: array
          items:
            $ref: '#/components/schemas/PhysicalBinding'
          description: >-
            List of bindings that associate logical infrastructure elements with physical test resources.
          x-field-uid: 3

    RankBinding:
      description: >-
        Assigns a rank to a logical NPU and lists the NICs available to that NPU.
      type: object
      properties:
        infra_ref:
          $ref: '#/components/schemas/InfraRef'
          description: >-
            Reference to the NPU used by this rank.
          x-field-uid: 1
        rank_id:
          type: integer
          description: >-
            The unique identifier for this rank in the distributed workload.
